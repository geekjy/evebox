name: Build Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to GitHub Release"
        required: true
        type: boolean
        default: true
      tag_name:
        description: "Release tag name for manual runs (example: v1.0.0-custom.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            artifact_name: evebox-dist-linux-x64
          - target: linux-arm64
            artifact_name: evebox-dist-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release package
        run: bash -x ./build-dist.sh ${{ matrix.target }}

      - name: Collect release files
        run: |
          mkdir -p release
          cp -a dist/* release/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Decide release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
            if [ -z "$TAG" ]; then
              TAG="manual-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: release-assets/**/*
